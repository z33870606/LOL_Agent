name: Daily LoL Patch Scraper

# 設定觸發條件
on:
  workflow_dispatch: # 1. 允許你在 GitHub 網頁上點擊按鈕手動執行
  schedule:
    - cron: '0 0 * * *' # 2. (可選) 每天半夜自動執行一次

# 給予寫入權限，這樣 Actions 才能把產生的檔案推回你的倉庫
permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虛擬機

    steps:
    - name: 1. 下載你的程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 你可以根據你的環境調整版本

    - name: 3. 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 執行爬蟲與資料庫更新程式
      run: python update_patch_db.py # 如果你的 python 檔名不是 main.py，請在這裡修改

    - name: 5. 將產生的 txt 檔與資料庫提交回 GitHub
      run: |
        # 設定虛擬機的 Git 身份
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 將產生的文字檔加入追蹤 (對應程式碼中的 debug_raw_patch.txt)
        git add debug_raw_patch.txt
        
        # 也可以順便把 ChromaDB 的資料夾備份上來 (如果有的話)
        git add patch_db/ || true
        
        # 提交變更。如果檔案沒變更(例如沒有新版本)，則略過報錯
        git commit -m "🤖 自動更新：抓取最新版本公告與清洗文本" || echo "今天沒有新變更"
        
        # 推送回 GitHub 倉庫
        git push
